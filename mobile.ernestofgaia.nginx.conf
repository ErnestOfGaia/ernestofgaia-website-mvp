# ─── mobile.ernestofgaia.xyz ─────────────────────────────────────────────────
# The mobile site is now merged into the same React app as the desktop site.
# This config proxies mobile.ernestofgaia.xyz to the same Docker container
# (port 8082) that serves ernestofgaia.xyz.
# The React app detects mobile via screen width and renders accordingly.
#
# After DNS is live: certbot --nginx -d mobile.ernestofgaia.xyz

server {
    listen 80;
    listen [::]:80;
    server_name mobile.ernestofgaia.xyz;

    # Redirect HTTP → HTTPS once SSL is configured (uncomment after certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}

